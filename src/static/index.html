<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mergington High School Activities</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header>
    <nav class="blue darken-4">
      <div class="nav-wrapper container">
        <a href="#" class="brand-logo">Mergington High School</a>
        <a href="#" data-target="mobile-nav" class="sidenav-trigger"><i class="material-icons">menu</i></a>
        <ul class="right hide-on-med-and-down">
          <li><a href="#activities-container">Activities</a></li>
          <li><a href="#signup-container">Sign Up</a></li>
        </ul>
      </div>
    </nav>

    <ul class="sidenav" id="mobile-nav">
      <li><a href="#activities-container">Activities</a></li>
      <li><a href="#signup-container">Sign Up</a></li>
    </ul>
  </header>

  <main class="container">
    <div class="row">
      <section id="activities-container" class="col s12 m6 card">
        <div class="card-content">
          <h3 class="card-title">Available Activities</h3>
          <div id="activities-list">
            <!-- Activities will be loaded here -->
            <p>Loading activities...</p>
          </div>
        </div>
      </section>

      <section id="signup-container" class="col s12 m6 card">
        <div class="card-content">
          <h3 class="card-title">Sign Up for an Activity</h3>
          <form id="signup-form">
            <div class="input-field">
              <input type="email" id="email" required placeholder="your-email@mergington.edu" />
              <label for="email">Student Email</label>
            </div>
            <div class="input-field">
              <select id="activity" required>
                <option value="" disabled selected>-- Select an activity --</option>
                <!-- Activity options will be loaded here -->
              </select>
              <label for="activity">Select Activity</label>
            </div>
            <button type="submit" class="btn waves-effect waves-light blue darken-4">Sign Up</button>
          </form>
          <div id="message" class="hidden"></div>
        </div>
      </section>
    </div>
  </main>

  <footer class="page-footer blue darken-4">
    <div class="container center-align">
      <p>&copy; 2023 Mergington High School</p>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const elems = document.querySelectorAll('select');
      M.FormSelect.init(elems);

      const sidenavElems = document.querySelectorAll('.sidenav');
      M.Sidenav.init(sidenavElems);
    });
  </script>
  <script src="app.js"></script>
</body>

</html>
